name: Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore cache from gh-pages
        run: |
          mkdir -p data/releases
          git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/gh-pages -- data 2>/dev/null || true

      - name: Build diffedora image
        run: docker build -f Containerfile -t diffedora . -q

      - name: Prepare site
        run: mkdir -p _site

      - name: Build Silverblue HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY \
            -v "$PWD/data:/cache" \
            diffedora --cache-dir /cache --releases 20 --variant silverblue --output html \
            > _site/index.html

      - name: Build CoreOS HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY \
            -v "$PWD/data:/cache" \
            diffedora --cache-dir /cache --releases 5 --variant coreos --output html \
            > _site/coreos.html

      - name: Finalize site
        run: |
          cp -r data _site/
          touch _site/.nojekyll

      - name: Deploy to gh-pages
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
